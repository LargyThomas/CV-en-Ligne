  <div class="page-hero">
    <div class="page-hero-bg"></div>
    <div class="page-hero-grid"></div>
    <div class="page-hero-content">
      <div class="page-tag">Me contacter</div>
      <h1 class="page-title">Restons en <span>contact</span></h1>
    </div>
  </div>

  <div class="page-content">
    <div class="contact-wrapper">

      <div class="contact-info">
        <p class="section-label">Mes coordonnées</p>
        <a href="tel:0785724079" class="contact-info-item">
          <div class="contact-info-icon"><i class="fas fa-phone"></i></div>
          <div>
            <div class="contact-info-label">Téléphone</div>
            <div class="contact-info-value">07 85 72 40 79</div>
          </div>
        </a>
        <a href="mailto:largythomas@gmail.com" class="contact-info-item">
          <div class="contact-info-icon"><i class="fas fa-envelope"></i></div>
          <div>
            <div class="contact-info-label">Email</div>
            <div class="contact-info-value">largythomas@gmail.com</div>
          </div>
        </a>
        <div class="contact-info-item">
          <div class="contact-info-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div>
            <div class="contact-info-label">Localisation</div>
            <div class="contact-info-value">Saône-et-Loire,<br>Bourgogne</div>
          </div>
        </div>
      </div>

      <div class="form-card">
        <form action="https://formspree.io/f/mwvnrvjn" method="POST">
          <div class="form-group">
            <label class="form-label" for="name">Nom</label>
            <input class="form-input" type="text" id="name" name="name" placeholder="Votre nom" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email" placeholder="votre@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-input" id="message" name="message" placeholder="Votre message..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> Envoyer
          </button>
        </form>
      </div>

    </div>
  </div>
